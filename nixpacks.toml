# Nixpacks configuration for Railway
# Ensures pnpm is available

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = ["corepack enable && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter server db:generate", "pnpm build:server"]

[start]
cmd = "cd apps/server && node dist/index.js"